# Bu dosya Jenkins pipeline tarafından kullanılır.
# Image'ı local build yerine Harbor'dan çeker.
# Kullanım: IMAGE_TAG=42 HARBOR_FQDN=172.17.160.76 HARBOR_PROJECT=ngn-list-vmware docker compose -f docker-compose.harbor.yml up -d

services:
  app:
    image: ${HARBOR_FQDN}/${HARBOR_PROJECT}/spring-ngn-app:${IMAGE_TAG}
    container_name: app
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/petclinic
      - SPRING_DATASOURCE_USERNAME=petclinic
      - SPRING_DATASOURCE_PASSWORD=petclinic
    volumes:
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:18.1
    container_name: postgres
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_DB=petclinic
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petclinic -d petclinic"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  app_logs:
